binary_sensor:
  # Start MCP23017 Chip number 2 - 14 zones
  # Zone 15 Input
  - platform: gpio
    name: Zone 15
    pin:
      mcp23xxx: mcp23017_2
      number: 8
      mode:
        input: true
        pullup: false
      inverted: $sensor_inverted
    use_interrupt: false
    filters: &pir_filter
      - delayed_on_off:
          time_on: $sensor_debounce_time
          time_off: $pir_delayed_off

  # Zone 16 Input
  - platform: gpio
    name: Zone 16
    pin:
      mcp23xxx: mcp23017_2
      number: 9
      mode:
        input: true
        pullup: false
      inverted: $sensor_inverted
    use_interrupt: false
    filters: *pir_filter

