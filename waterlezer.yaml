substitutions:
  devicename: waterlezer
  friendly_name: Waterlezer
  device_description: Water meter sensor
  version: "v23.08.03"

################ Generics ################
esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  comment: "${device_description}"
  name_add_mac_suffix: false
  platformio_options:
    upload_speed: 921600
  project:
    name: smartstuff.waterlezer
    version: ${version}
  on_boot:
    priority: -100
    then:
      # Restore the native pulse counter total from the persisted meter value.
      - pulse_counter.set_total_pulses:
          id: watermeter_pulse
          value: !lambda "return id(totalWaterUsage);"

esp8266:
  board: esp12e
  restore_from_flash: true

status_led:
  pin:
    number: 2
    inverted: true

# General settings: captive portal, logger, api, ota, time, restart, webserver, wifi
# General sensors: status, uptime, version, wifi info etc
packages:
  general_settings: !include includes/general_settings.yaml
  general_sensors: !include includes/general_sensors.yaml

api:
  # Via Home Assistant Ontwikkelhulpmiddelen > actions zoeken op
  # esphome.waterlezer_set_water_reading en daarmee de beginstand invoeren.
  actions:
    - action: set_water_reading
      variables:
        meter_value: int
      then:
        - pulse_counter.set_total_pulses:
            id: watermeter_pulse
            value: !lambda "return meter_value;"
        - globals.set:
            id: totalWaterUsage
            value: !lambda "return meter_value;"

################ Sensors ################
globals:
  - id: totalWaterUsage
    type: int
    restore_value: true
    initial_value: "0"

sensor:
  - platform: pulse_counter
    pin:
      number: 5
      mode:
        input: true
        pullup: true
    id: watermeter_pulse
    name: "Watermeter pulse"
    count_mode:
      rising_edge: DISABLE
      falling_edge: INCREMENT
    state_class: measurement
    update_interval: 1s
    internal_filter: 100us
    accuracy_decimals: 0
    unit_of_measurement: "L/min"
    internal: true
    total:
      id: watermeter_total
      name: "Watermeter total"
      state_class: total_increasing
      device_class: water
      icon: mdi:water
      unit_of_measurement: L
      accuracy_decimals: 0
      on_value:
        then:
          - globals.set:
              id: totalWaterUsage
              value: !lambda "return (int) roundf(x);"
